name: Security Audit

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/python/pyproject.toml

      - name: Install
        working-directory: packages/python
        run: pip install -e ".[dev]" pip-audit

      - name: Audit
        run: pip-audit --progress-spinner off

  npm-audit:
    name: npm audit (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/npm/package-lock.json

      - name: Install
        working-directory: packages/npm
        run: npm ci

      - name: Audit
        working-directory: packages/npm
        run: npm audit --audit-level=high
