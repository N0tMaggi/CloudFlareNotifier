[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cloudflare-notifier"
version = "0.1.1"
description = "Poll Cloudflare security events and react to them in Python apps."
requires-python = ">=3.10"
dependencies = [
    "aiohttp>=3.9",
]

[tool.hatch.build.targets.wheel]
packages = ["src/cloudflare_notifier"]

[tool.mypy]
files = ["src"]
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.10",
    "ruff>=0.4",
]

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
